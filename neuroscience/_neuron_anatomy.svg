<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 295"
     style="width:100%;max-width:760px;font-family:'IBM Plex Sans',sans-serif;display:block;">

  <!-- Background -->
  <rect width="820" height="295" fill="#f7f7f4" rx="8"/>

  <!-- ═══ DENDRITES ═══ -->
  <!-- Primary 1: upper-left -->
  <line x1="158" y1="111" x2="113" y2="74"  stroke="#8a7060" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="113" y1="74"  x2="76"  y2="48"  stroke="#8a7060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="113" y1="74"  x2="92"  y2="43"  stroke="#8a7060" stroke-width="2"   stroke-linecap="round"/>
  <line x1="76"  y1="48"  x2="52"  y2="30"  stroke="#8a7060" stroke-width="2"   stroke-linecap="round"/>
  <line x1="76"  y1="48"  x2="56"  y2="64"  stroke="#8a7060" stroke-width="2"   stroke-linecap="round"/>

  <!-- Primary 2: left -->
  <line x1="137" y1="145" x2="83"  y2="142" stroke="#8a7060" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="83"  y1="142" x2="44"  y2="124" stroke="#8a7060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83"  y1="142" x2="42"  y2="162" stroke="#8a7060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44"  y1="124" x2="18"  y2="114" stroke="#8a7060" stroke-width="2"   stroke-linecap="round"/>

  <!-- Primary 3: lower-left -->
  <line x1="158" y1="178" x2="113" y2="215" stroke="#8a7060" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="113" y1="215" x2="76"  y2="239" stroke="#8a7060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="113" y1="215" x2="87"  y2="253" stroke="#8a7060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76"  y1="239" x2="46"  y2="257" stroke="#8a7060" stroke-width="2"   stroke-linecap="round"/>

  <!-- ═══ SOMA ═══ -->
  <ellipse cx="185" cy="145" rx="50" ry="48" fill="#e8d5b8" stroke="#8a6a48" stroke-width="2.5"/>

  <!-- Nucleus -->
  <ellipse cx="185" cy="145" rx="21" ry="19" fill="#c8a878" stroke="#8a6a48" stroke-width="1.5"/>

  <!-- ═══ AXON HILLOCK ═══ -->
  <polygon points="233,135 233,155 276,149 276,141" fill="#e8d5b8" stroke="#8a6a48" stroke-width="2"/>

  <!-- ═══ AXON SHAFT ═══ -->
  <line x1="276" y1="145" x2="756" y2="145" stroke="#8a6a48" stroke-width="4" stroke-linecap="butt"/>

  <!-- ═══ MYELIN SHEATHS ═══ -->
  <rect x="285" y="134" width="80" height="22" rx="11" fill="#b8d4ea" stroke="#4878a0" stroke-width="1.5"/>
  <rect x="378" y="134" width="80" height="22" rx="11" fill="#b8d4ea" stroke="#4878a0" stroke-width="1.5"/>
  <rect x="471" y="134" width="80" height="22" rx="11" fill="#b8d4ea" stroke="#4878a0" stroke-width="1.5"/>
  <rect x="564" y="134" width="80" height="22" rx="11" fill="#b8d4ea" stroke="#4878a0" stroke-width="1.5"/>

  <!-- ═══ AXON TERMINAL (BOUTON) ═══ -->
  <ellipse cx="756" cy="145" rx="19" ry="15" fill="#e8d5b8" stroke="#8a6a48" stroke-width="2"/>

  <!-- ═══ LABELS ═══ -->

  <!-- Dendrites (top-left) -->
  <line x1="72" y1="47" x2="55" y2="27" stroke="#9aabb8" stroke-width="1"/>
  <text x="8" y="24" font-size="12" fill="#1a2840" font-weight="500">Dendrites</text>

  <!-- Nucleus (leader from nucleus to upper-right) -->
  <line x1="200" y1="132" x2="238" y2="96" stroke="#9aabb8" stroke-width="1"/>
  <text x="240" y="92" font-size="12" fill="#1a2840">Nucleus</text>

  <!-- Node of Ranvier (above, at gap 365–378, centre x=371) -->
  <line x1="371" y1="134" x2="371" y2="96" stroke="#9aabb8" stroke-width="1"/>
  <text x="371" y="90" font-size="11.5" fill="#1a2840" text-anchor="middle">Node of Ranvier</text>

  <!-- Myelin sheath (above, centre of sheath 3, x=511) -->
  <line x1="511" y1="134" x2="511" y2="96" stroke="#9aabb8" stroke-width="1"/>
  <text x="511" y="90" font-size="11.5" fill="#1a2840" text-anchor="middle">Myelin sheath</text>

  <!-- Cell body (soma) — below soma -->
  <line x1="185" y1="194" x2="165" y2="242" stroke="#9aabb8" stroke-width="1"/>
  <text x="165" y="256" font-size="12" fill="#1a2840" font-weight="500" text-anchor="middle">Cell body (soma)</text>

  <!-- Axon hillock — below, slightly right -->
  <line x1="255" y1="155" x2="272" y2="265" stroke="#9aabb8" stroke-width="1"/>
  <text x="272" y="278" font-size="12" fill="#1a2840" text-anchor="middle">Axon hillock</text>

  <!-- Axon terminal (bouton) — below -->
  <line x1="756" y1="161" x2="756" y2="250" stroke="#9aabb8" stroke-width="1"/>
  <text x="756" y="265" font-size="12" fill="#1a2840" text-anchor="middle">Axon terminal</text>
  <text x="756" y="279" font-size="12" fill="#1a2840" text-anchor="middle">(bouton)</text>

</svg>
