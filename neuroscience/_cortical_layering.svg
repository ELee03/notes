<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 500" style="width:100%;max-width:660px;font-family:'IBM Plex Sans',sans-serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#3a6a8a"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#c17c2e"/>
    </marker>
    <marker id="arr-grey" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#9aabb8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="660" height="500" fill="#f5f5f2" rx="8"/>

  <!-- Title -->
  <text x="330" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2840">Inside-Out Cortical Neurogenesis</text>

  <!-- ── Layer blocks (top = superficial, bottom = deep) ── -->

  <!-- Layer I: Marginal Zone, y=45-88 -->
  <rect x="220" y="45" width="200" height="43" rx="0" fill="#f0f6fa" stroke="#c5d8e5" stroke-width="1"/>
  <text x="320" y="63" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">I · Marginal Zone</text>
  <text x="320" y="78" text-anchor="middle" font-size="9" fill="#9aabb8">Cajal-Retzius cells · Reelin source</text>

  <!-- Layer II, y=88-133 -->
  <rect x="220" y="88" width="200" height="45" rx="0" fill="#e8f2f8" stroke="#c5d8e5" stroke-width="1"/>
  <text x="320" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">II</text>

  <!-- Layer III, y=133-190 -->
  <rect x="220" y="133" width="200" height="57" rx="0" fill="#ddedf5" stroke="#c5d8e5" stroke-width="1"/>
  <text x="320" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">III</text>

  <!-- Layer IV, y=190-240 -->
  <rect x="220" y="190" width="200" height="50" rx="0" fill="#cfe5ef" stroke="#c5d8e5" stroke-width="1"/>
  <text x="320" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">IV</text>

  <!-- Layer V, y=240-305 -->
  <rect x="220" y="240" width="200" height="65" rx="0" fill="#c0dcea" stroke="#b0cedd" stroke-width="1"/>
  <text x="320" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">V</text>

  <!-- Layer VI, y=305-365 -->
  <rect x="220" y="305" width="200" height="60" rx="0" fill="#aed0e3" stroke="#9ac0d8" stroke-width="1"/>
  <text x="320" y="337" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2840">VI</text>

  <!-- White matter, y=365-390 -->
  <rect x="220" y="365" width="200" height="25" rx="0" fill="#e8e8e5" stroke="#c8c8c5" stroke-width="1"/>
  <text x="320" y="381" text-anchor="middle" font-size="9" fill="#9aabb8" font-style="italic">white matter</text>

  <!-- Ventricular Zone, y=390-445 -->
  <rect x="220" y="390" width="200" height="55" rx="0" fill="#d0e8f5" stroke="#90c0d8" stroke-width="1.5"/>
  <text x="320" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#2a5a7a">Ventricular Zone (VZ)</text>
  <text x="320" y="428" text-anchor="middle" font-size="9" fill="#3a6a8a">progenitor cells divide here</text>
  <!-- Dividing cell symbol -->
  <circle cx="260" cy="438" r="5" fill="none" stroke="#3a6a8a" stroke-width="1.2"/>
  <line x1="260" y1="433" x2="260" y2="443" stroke="#3a6a8a" stroke-width="1"/>
  <circle cx="285" cy="438" r="5" fill="none" stroke="#3a6a8a" stroke-width="1.2"/>
  <line x1="285" y1="433" x2="285" y2="443" stroke="#3a6a8a" stroke-width="1"/>
  <circle cx="350" cy="438" r="5" fill="none" stroke="#3a6a8a" stroke-width="1.2"/>
  <circle cx="370" cy="438" r="5" fill="none" stroke="#3a6a8a" stroke-width="1.2"/>
  <text x="360" y="433" text-anchor="middle" font-size="8" fill="#9aabb8">÷</text>

  <!-- ── Radial glia fibers (thin vertical, in column) ── -->
  <line x1="265" y1="45" x2="265" y2="390" stroke="#7ab8d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.55"/>
  <line x1="320" y1="45" x2="320" y2="390" stroke="#7ab8d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.55"/>
  <line x1="375" y1="45" x2="375" y2="390" stroke="#7ab8d4" stroke-width="1" stroke-dasharray="3,5" opacity="0.55"/>

  <!-- Migrating neuron climbing radial glia (on middle fiber, in Layer III) -->
  <circle cx="320" cy="155" r="7" fill="#3a6a8a" opacity="0.85"/>
  <!-- tiny arrow showing direction of migration (upward) -->
  <line x1="320" y1="140" x2="320" y2="130" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="333" y="151" font-size="9" fill="#3a6a8a">late-born neuron</text>
  <text x="333" y="163" font-size="9" fill="#3a6a8a">migrating upward</text>

  <!-- ── Left side: birth-order annotations ── -->

  <!-- Time axis (far left, upward arrow = later in time) -->
  <line x1="38" y1="390" x2="38" y2="50" stroke="#9aabb8" stroke-width="1.5" marker-end="url(#arr-grey)"/>
  <text x="26" y="420" text-anchor="middle" font-size="9" fill="#9aabb8">Early</text>
  <text x="26" y="38" text-anchor="middle" font-size="9" fill="#9aabb8">Late</text>
  <text x="24" y="225" text-anchor="middle" font-size="9" fill="#9aabb8" transform="rotate(-90 24 225)">Neurogenesis time →</text>

  <!-- "Early-born" bracket pointing to Layers V-VI -->
  <line x1="218" y1="272" x2="145" y2="272" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="218" y1="335" x2="145" y2="335" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="145" y1="272" x2="145" y2="335" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="145" y1="303" x2="110" y2="303" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="55" y="297" text-anchor="start" font-size="10" font-weight="600" fill="#3a6a8a">Early-</text>
  <text x="55" y="310" text-anchor="start" font-size="10" font-weight="600" fill="#3a6a8a">born</text>
  <text x="55" y="323" text-anchor="start" font-size="9" fill="#9aabb8">→ deep (V–VI)</text>

  <!-- "Late-born" bracket pointing to Layers II-III -->
  <line x1="218" y1="100" x2="145" y2="100" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="218" y1="178" x2="145" y2="178" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="145" y1="100" x2="145" y2="178" stroke="#3a6a8a" stroke-width="1.5"/>
  <line x1="145" y1="139" x2="110" y2="139" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="55" y="125" text-anchor="start" font-size="10" font-weight="600" fill="#3a6a8a">Late-</text>
  <text x="55" y="138" text-anchor="start" font-size="10" font-weight="600" fill="#3a6a8a">born</text>
  <text x="55" y="151" text-anchor="start" font-size="9" fill="#9aabb8">pass deep layers</text>
  <text x="55" y="163" text-anchor="start" font-size="9" fill="#9aabb8">→ II–III</text>

  <!-- ── Right side: Reelin signal ── -->
  <line x1="422" y1="65" x2="490" y2="65" stroke="#c17c2e" stroke-width="1.5"/>
  <!-- Reelin gradient arrow pointing downward -->
  <line x1="490" y1="65" x2="490" y2="140" stroke="#c17c2e" stroke-width="1.5" marker-end="url(#arr-amber)" stroke-dasharray="3,3"/>
  <text x="496" y="62" font-size="10" font-weight="600" fill="#c17c2e">Reelin</text>
  <text x="496" y="76" font-size="9" fill="#c17c2e">"stop here"</text>
  <text x="496" y="89" font-size="9" fill="#c17c2e">signal gradient</text>
  <text x="496" y="102" font-size="9" fill="#9aabb8">(Cajal-Retzius →</text>
  <text x="496" y="114" font-size="9" fill="#9aabb8">migrating neuron)</text>

  <!-- Radial glia label -->
  <line x1="422" y1="220" x2="458" y2="220" stroke="#7ab8d4" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="462" y="216" font-size="9" fill="#7ab8d4">radial glia</text>
  <text x="462" y="228" font-size="9" fill="#7ab8d4">scaffold</text>

  <!-- Caption -->
  <text x="330" y="474" text-anchor="middle" font-size="10" fill="#9aabb8" font-style="italic">Inside-out pattern: early-born neurons occupy deep layers; late-born neurons migrate past them to superficial layers</text>
</svg>
