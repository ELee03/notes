<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width:100%;max-width:680px;font-family:'IBM Plex Sans',sans-serif;">

  <!-- Background -->
  <rect width="680" height="400" fill="#f5f5f2" rx="8"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2840">Single-Channel Patch-Clamp Recording (Na⁺ channel)</text>

  <!-- ═══ Panel A: Voltage step command ═══ -->
  <text x="68" y="50" font-size="10" font-weight="600" fill="#1a2840">(a) Voltage command</text>

  <!-- V axis label -->
  <text x="18" y="100" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90 18 100)">V (mV)</text>

  <!-- Axis lines -->
  <line x1="55" y1="45" x2="55" y2="130" stroke="#bbb" stroke-width="1"/>
  <line x1="55" y1="100" x2="620" y2="100" stroke="#bbb" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- -65 mV label -->
  <text x="50" y="104" text-anchor="end" font-size="9" fill="#666">−65</text>
  <!-- -40 mV label -->
  <text x="50" y="64" text-anchor="end" font-size="9" fill="#666">−40</text>
  <line x1="52" y1="60" x2="55" y2="60" stroke="#bbb" stroke-width="1"/>

  <!-- Voltage step waveform: hold at -65, step to -40, return -->
  <polyline points="55,100 160,100 160,60 500,60 500,100 620,100"
            fill="none" stroke="#3a6a8a" stroke-width="2"/>

  <!-- Step annotation arrows -->
  <line x1="160" y1="108" x2="160" y2="120" stroke="#9aabb8" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="162" y="128" font-size="8" fill="#9aabb8">depolarise</text>
  <line x1="500" y1="108" x2="500" y2="120" stroke="#9aabb8" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="502" y="128" font-size="8" fill="#9aabb8">repolarise</text>

  <!-- ═══ Panel B: Three single-channel sweeps ═══ -->
  <text x="68" y="155" font-size="10" font-weight="600" fill="#1a2840">(b) Three independent sweeps — same patch</text>

  <!-- I axis label -->
  <text x="18" y="280" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90 18 280)">I (pA)</text>

  <!-- Sweep baselines and channel open pulses -->
  <!-- Sweep 1: y baseline=205, open pulses go down to y=235 -->
  <text x="50" y="209" text-anchor="end" font-size="9" fill="#666">1</text>
  <line x1="55" y1="205" x2="620" y2="205" stroke="#ddd" stroke-width="0.5"/>
  <!-- closed (baseline) segments, channel open = downward pulse -->
  <polyline points="55,205 160,205 160,205 210,205 210,235 270,235 270,205 350,205 350,235 395,235 395,205 500,205 500,205 620,205"
            fill="none" stroke="#3a6a8a" stroke-width="1.8"/>

  <!-- Sweep 2: y baseline=270 -->
  <text x="50" y="274" text-anchor="end" font-size="9" fill="#666">2</text>
  <line x1="55" y1="270" x2="620" y2="270" stroke="#ddd" stroke-width="0.5"/>
  <polyline points="55,270 160,270 160,270 240,270 240,300 310,300 310,270 430,270 430,300 480,300 480,270 500,270 500,270 620,270"
            fill="none" stroke="#3a6a8a" stroke-width="1.8"/>

  <!-- Sweep 3: y baseline=335 -->
  <text x="50" y="339" text-anchor="end" font-size="9" fill="#666">3</text>
  <line x1="55" y1="335" x2="620" y2="335" stroke="#ddd" stroke-width="0.5"/>
  <polyline points="55,335 160,335 160,335 190,335 190,365 240,365 240,335 380,335 380,365 415,365 415,335 500,335 500,335 620,335"
            fill="none" stroke="#3a6a8a" stroke-width="1.8"/>

  <!-- "open" labels for sweep 1 -->
  <text x="238" y="248" text-anchor="middle" font-size="8" fill="#3a6a8a" font-style="italic">open</text>
  <text x="372" y="248" text-anchor="middle" font-size="8" fill="#3a6a8a" font-style="italic">open</text>

  <!-- Calibration bar: 1 pA -->
  <line x1="600" y1="205" x2="600" y2="235" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="205" x2="603" y2="205" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="235" x2="603" y2="235" stroke="#555" stroke-width="1.5"/>
  <text x="612" y="224" font-size="8" fill="#555">1 pA</text>

  <!-- "closed" label on right -->
  <text x="625" y="209" font-size="8" fill="#9aabb8">— closed</text>

  <!-- Depolarisation window shading across all sweeps -->
  <rect x="160" y="165" width="340" height="185" fill="#3a6a8a" opacity="0.04" rx="2"/>

  <!-- Caption -->
  <text x="340" y="390" text-anchor="middle" font-size="9" fill="#9aabb8" font-style="italic">Each sweep is a separate trial; channel openings are stochastic — same voltage, different timing and duration</text>

</svg>
