<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" style="width:100%;max-width:760px;font-family:'IBM Plex Sans',sans-serif;">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#3a6a8a"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#4a8a5a"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#7a5aaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="420" fill="#f5f5f2" rx="8"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2840">Amygdala Circuit: Sensory Input → Fear Output</text>

  <!-- ── SENSORY INPUTS box ── -->
  <rect x="14" y="100" width="118" height="90" rx="6" fill="#e8f0f5" stroke="#3a6a8a" stroke-width="1.5"/>
  <text x="73" y="124" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2840">Sensory Input</text>
  <text x="73" y="141" text-anchor="middle" font-size="10" fill="#2a3040">auditory / visual</text>
  <text x="73" y="156" text-anchor="middle" font-size="10" fill="#2a3040">thalamus</text>
  <text x="73" y="171" text-anchor="middle" font-size="10" fill="#2a3040">cortex</text>

  <!-- Arrow: Sensory → LA -->
  <line x1="132" y1="128" x2="188" y2="115" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- Arrow: Sensory → BA -->
  <line x1="132" y1="162" x2="188" y2="182" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ── BLA dashed outline ── -->
  <rect x="174" y="70" width="178" height="200" rx="8" fill="none" stroke="#9aabb8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="263" y="62" text-anchor="middle" font-size="10" fill="#9aabb8" font-weight="500">Basolateral Amygdala (BLA)</text>

  <!-- ── LA box ── -->
  <rect x="184" y="80" width="158" height="72" rx="6" fill="#e8f0f5" stroke="#3a6a8a" stroke-width="1.5"/>
  <text x="263" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2840">Lateral Nucleus (LA)</text>
  <text x="263" y="121" text-anchor="middle" font-size="10" fill="#2a3040">CS–US association via LTP</text>
  <text x="263" y="136" text-anchor="middle" font-size="10" fill="#2a3040">primary sensory gateway</text>

  <!-- ── BA box ── -->
  <rect x="184" y="170" width="158" height="88" rx="6" fill="#e8f0f5" stroke="#3a6a8a" stroke-width="1.5"/>
  <text x="263" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2840">Basal Nucleus (BA)</text>
  <text x="263" y="212" text-anchor="middle" font-size="10" fill="#2a3040">reward integration</text>
  <text x="263" y="228" text-anchor="middle" font-size="10" fill="#2a3040">PFC ↔ amygdala link</text>
  <text x="263" y="244" text-anchor="middle" font-size="10" fill="#2a3040">→ ventral striatum</text>

  <!-- ── ITC box (inhibitory gate, amber) ── -->
  <rect x="386" y="148" width="90" height="64" rx="6" fill="#fdf5ec" stroke="#c17c2e" stroke-width="1.5"/>
  <text x="431" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#8b5a1e">ITC cells</text>
  <text x="431" y="187" text-anchor="middle" font-size="10" fill="#8b5a1e">GABAergic gate</text>
  <text x="431" y="201" text-anchor="middle" font-size="10" fill="#8b5a1e">suppresses CeA</text>

  <!-- Arrow: LA → ITC -->
  <line x1="342" y1="130" x2="383" y2="162" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- Arrow: BA → ITC -->
  <line x1="342" y1="200" x2="383" y2="196" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ── CeA box ── -->
  <rect x="508" y="80" width="148" height="110" rx="6" fill="#e8f0f5" stroke="#3a6a8a" stroke-width="1.5"/>
  <text x="582" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2840">Central Nucleus</text>
  <text x="582" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2840">(CeA)</text>
  <text x="582" y="142" text-anchor="middle" font-size="10" fill="#2a3040">fear output hub</text>
  <text x="582" y="158" text-anchor="middle" font-size="10" fill="#2a3040">→ HPA · PAG · brainstem</text>
  <text x="582" y="174" text-anchor="middle" font-size="10" fill="#2a3040">→ startle · freezing · HR↑</text>

  <!-- ITC ⊣ CeA (flat-T inhibitory) -->
  <line x1="476" y1="178" x2="503" y2="155" stroke="#c17c2e" stroke-width="2"/>
  <!-- T-bar at CeA end -->
  <line x1="497" y1="148" x2="509" y2="162" stroke="#c17c2e" stroke-width="2.5"/>

  <!-- LA → CeA direct (dashed bypasses ITC) -->
  <line x1="342" y1="107" x2="506" y2="107" stroke="#3a6a8a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

  <!-- ── PFC box (extinction pathway) ── -->
  <rect x="184" y="310" width="158" height="62" rx="6" fill="#edf5ef" stroke="#4a8a5a" stroke-width="1.5"/>
  <text x="263" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5a3a">Prefrontal Cortex</text>
  <text x="263" y="351" text-anchor="middle" font-size="10" fill="#3a6a4a">infralimbic (IL-PFC)</text>
  <text x="263" y="365" text-anchor="middle" font-size="10" fill="#3a6a4a">active during extinction</text>

  <!-- Arrow: PFC → ITC (curved, extinction) -->
  <path d="M 263 310 Q 340 290 431 214" fill="none" stroke="#4a8a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>

  <!-- ── Outputs (right column) ── -->
  <rect x="668" y="68" width="80" height="36" rx="4" fill="#f0ebf8" stroke="#7a5aaa" stroke-width="1.2"/>
  <text x="708" y="84" text-anchor="middle" font-size="10" fill="#4a2a7a" font-weight="600">Hypothalamus</text>
  <text x="708" y="98" text-anchor="middle" font-size="9" fill="#4a2a7a">HPA axis → cortisol</text>

  <rect x="668" y="116" width="80" height="36" rx="4" fill="#f0ebf8" stroke="#7a5aaa" stroke-width="1.2"/>
  <text x="708" y="132" text-anchor="middle" font-size="10" fill="#4a2a7a" font-weight="600">PAG</text>
  <text x="708" y="146" text-anchor="middle" font-size="9" fill="#4a2a7a">freezing · analgesia</text>

  <rect x="668" y="164" width="80" height="36" rx="4" fill="#f0ebf8" stroke="#7a5aaa" stroke-width="1.2"/>
  <text x="708" y="180" text-anchor="middle" font-size="10" fill="#4a2a7a" font-weight="600">Brainstem</text>
  <text x="708" y="194" text-anchor="middle" font-size="9" fill="#4a2a7a">startle · HR↑ · BP↑</text>

  <!-- Arrows: CeA → outputs -->
  <line x1="656" y1="118" x2="666" y2="90" stroke="#7a5aaa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="656" y1="130" x2="666" y2="134" stroke="#7a5aaa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="656" y1="148" x2="666" y2="176" stroke="#7a5aaa" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- ── Legend ── -->
  <line x1="14" y1="388" x2="34" y2="388" stroke="#3a6a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="38" y="392" font-size="10" fill="#9aabb8">Excitatory projection</text>

  <line x1="160" y1="388" x2="175" y2="388" stroke="#c17c2e" stroke-width="2"/>
  <line x1="174" y1="384" x2="176" y2="392" stroke="#c17c2e" stroke-width="2"/>
  <text x="180" y="392" font-size="10" fill="#9aabb8">Inhibitory (flat T = suppression)</text>

  <line x1="388" y1="388" x2="408" y2="388" stroke="#4a8a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>
  <text x="412" y="392" font-size="10" fill="#9aabb8">Extinction pathway (PFC → ITC)</text>

  <line x1="576" y1="388" x2="596" y2="388" stroke="#3a6a8a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="600" y="392" font-size="10" fill="#9aabb8">Direct LA → CeA (fast)</text>
</svg>
