books:

  # ── Control Theory ────────────────────────────────────────────────────────

  - id: ogata-mce
    title: Modern Control Engineering
    authors: [Katsuhiko Ogata]
    edition: 5th
    publisher: Pearson
    year: 2010
    clusters: [control]
    annotation: The standard undergraduate reference. Dense but comprehensive — transfer functions, root locus, frequency response, and state-space.

  - id: franklin-feedback
    title: Feedback Control of Dynamic Systems
    authors: [Gene F. Franklin, J. David Powell, Abbas Emami-Naeini]
    edition: 8th
    publisher: Pearson
    year: 2019
    clusters: [control]
    annotation: Strong on physical intuition and worked examples. Good for frequency-domain methods and digital control.

  - id: dorf-bishop
    title: Modern Control Systems
    authors: [Richard C. Dorf, Robert H. Bishop]
    edition: 13th
    publisher: Pearson
    year: 2017
    clusters: [control]
    annotation: Broad coverage of classical and modern control. Useful for root locus, PID tuning, and quick reference.

  # ── Embedded Systems ──────────────────────────────────────────────────────

  - id: white-mes
    title: Making Embedded Systems
    authors: [Elecia White]
    edition: 2nd
    publisher: O'Reilly
    year: 2024
    clusters: [embedded]
    annotation: Practical patterns for firmware architecture. Best entry point for embedded software design — state machines, driver layering, RTOS concepts.
    source: SchoolStuff:Textbooks/embedded/White - Making Embedded Systems (2nd ed, 2024).pdf

  - id: yiu-arm
    title: The Definitive Guide to ARM Cortex-M3 and Cortex-M4 Processors
    authors: [Joseph Yiu]
    edition: 3rd  # NOTE: local copy is 3rd ed (2013). A 4th ed is sometimes cited but the 3rd is the standard widely-available version.
    publisher: Newnes
    year: 2013
    clusters: [embedded]
    annotation: Authoritative reference for the Cortex-M architecture, NVIC, memory model, and fault handling. The ground truth for ARM-core specifics. Covers M3 and M4; newer M33 core (EFR32xG21+) requires the ARM Architecture Reference Manual.
    source: SchoolStuff:Textbooks/embedded/Yiu - Definitive Guide to ARM Cortex-M3 and Cortex-M4 (3rd ed, 2013).pdf

  - id: barr-massa
    title: Programming Embedded Systems
    authors: [Michael Barr, Anthony Massa]
    edition: 2nd
    publisher: O'Reilly
    year: 2006
    clusters: [embedded]
    annotation: Solid coverage of bare-metal C patterns and peripheral driver design. Practical and hardware-focused.
    # NOTE: No local copy. Lower priority — White covers similar ground more modernly. Useful for historical context on bare-metal C and linker scripts.

  - id: horowitz-aoe
    title: The Art of Electronics
    authors: [Paul Horowitz, Winfield Hill]
    edition: 3rd
    publisher: Cambridge University Press
    year: 2015
    clusters: [embedded, circuits, analog]
    annotation: The definitive practical electronics reference. Chapters on op-amps, ADCs, noise, and mixed-signal design are essential reading for any embedded hardware work.
    source: SchoolStuff:Textbooks/embedded/Horowitz & Hill - The Art of Electronics (3rd ed, 2015).pdf

  - id: ott-emc
    title: Electromagnetic Compatibility Engineering
    authors: [Henry W. Ott]
    publisher: Wiley
    year: 2009
    clusters: [embedded]
    annotation: The standard reference for PCB EMC — ground planes, return current paths, filtering, and layout for emissions and immunity.
    source: SchoolStuff:Textbooks/embedded/Electromagnetic Compatibility Engineering.pdf

  - id: chen-linsys
    title: Linear System Theory and Design
    authors: [Chi-Tsong Chen]
    edition: 3rd
    publisher: Oxford University Press
    year: 1999
    clusters: [control]
    annotation: Mathematically rigorous state-space treatment. Key reference for ECE 557 — controllability, observability, state feedback, observers, and the separation principle.

  - id: astrom-murray
    title: "Feedback Systems: An Introduction for Scientists and Engineers"
    authors: [Karl J. Astrom, Richard M. Murray]
    edition: 2nd
    publisher: Princeton University Press
    year: 2020
    clusters: [control]
    annotation: Freely available online. Emphasizes physical intuition and modern perspectives on feedback. Good companion to classical texts.
    url: https://www.cds.caltech.edu/~murray/amwiki/

  - id: khoo-physio-control
    title: "Physiological Control Systems: Analysis, Simulation, and Estimation"
    authors: [Michael C. K. Khoo]
    edition: 2nd
    publisher: IEEE Press / Wiley
    year: 2018
    clusters: [control, bioelectricity]
    annotation: Primary textbook for BME 331. Applies linear control theory to physiological systems — endocrine, cardiovascular, and neuromuscular control. Bridges engineering and biology.

  - id: broucke-adaptive-rl
    title: A First Course on Adaptive Control and Reinforcement Learning
    authors: [Mireille E. Broucke]
    publisher: University of Toronto (course notes)
    year: 2024
    clusters: [control, rl]
    annotation: UofT course notes bridging classical adaptive control and modern RL. Covers LQR, adaptive control, policy gradients, and Q-learning within a unified control-theoretic framework.
    source: SchoolStuff:Textbooks/computing/Broucke - A First Course on Adaptive Control and RL (UofT, 2024).pdf

  # ── Signals & Systems ─────────────────────────────────────────────────────

  - id: oppenheim-signals
    title: "Signals and Systems"
    authors: [Alan V. Oppenheim, Alan S. Willsky, S. Hamid Nawab]
    edition: 2nd
    publisher: Prentice-Hall
    year: 1996
    clusters: [signals]
    annotation: The definitive signals and systems text. Covers CTFT, DTFT, Laplace, Z-transform, convolution, sampling, and modulation. Primary textbook for ECE 355.

  - id: lathi-signals
    title: Linear Systems and Signals
    authors: [B. P. Lathi, Roger Green]
    edition: 3rd
    publisher: Oxford University Press
    year: 2017
    clusters: [signals]
    annotation: Alternative signals text used as an ECE 355 reference. Clear exposition and good problem sets.

  # ── Circuits & Electronics ────────────────────────────────────────────────

  - id: sadiku-circuits
    title: "Fundamentals of Electric Circuits"
    authors: [Charles K. Alexander, Matthew N. O. Sadiku]
    edition: 7th
    publisher: McGraw-Hill
    year: 2021
    clusters: [circuits]
    annotation: Primary circuits textbook for ECE 159. Covers KVL/KCL, phasors, Thevenin/Norton, op-amps, and AC steady-state analysis. Standard introductory circuits reference.
    source: SchoolStuff:Courses/Year 1/Term 2/ECE 159/- Fundamentals of Electric Circuits (7th edition) (2021).pdf

  - id: sedra-smith
    title: Microelectronic Circuits
    authors: [Adel S. Sedra, Kenneth C. Smith, Tony C. Carusone, Vincent Gaudet]
    edition: 8th
    publisher: Oxford University Press
    year: 2020
    clusters: [circuits, analog]
    annotation: Primary textbook for ECE 354. Covers BJT and MOSFET amplifiers, differential pairs, frequency response, feedback, and op-amp design. The standard microelectronics reference.

  # ── Analog IC Design ──────────────────────────────────────────────────────

  - id: carusone-analog-ic
    title: Analog Integrated Circuit Design
    authors: [Tony C. Carusone, David A. Johns, Kenneth W. Martin]
    edition: 2nd
    publisher: Wiley
    year: 2012
    clusters: [analog]
    annotation: Primary reference for ECE 430. Covers CMOS op-amp design, noise, frequency compensation, folded-cascode topologies, and fully differential amplifiers.
    source: SchoolStuff:Textbooks/analog/Analog Integrated Circuit Design - Carusone.pdf

  # ── Statistics & Probability ──────────────────────────────────────────────

  - id: walpole-stats
    title: "Probability & Statistics for Engineers and Scientists"
    authors: [Ronald E. Walpole, Raymond H. Myers, Sharon L. Myers, Keying Ye]
    edition: 9th
    publisher: Pearson
    year: 2011
    clusters: [statistics]
    annotation: Primary textbook for ECE 286. Covers probability distributions, joint distributions, CLT, point and interval estimation, hypothesis testing, and regression analysis.

  # ── Quantum Mechanics ─────────────────────────────────────────────────────

  - id: griffiths-qm
    title: Introduction to Quantum Mechanics
    authors: [David J. Griffiths, Darrell F. Schroeter]
    edition: 3rd
    publisher: Cambridge University Press
    year: 2018
    clusters: [quantum]
    annotation: The standard undergraduate quantum mechanics text. Clear pedagogical style, covers wave functions, Schrodinger equation, infinite square well, harmonic oscillator, hydrogen atom, and perturbation theory.
    source: SchoolStuff:Textbooks/quantum/Griffiths & Schroeter - Introduction to Quantum Mechanics (3rd ed, 2018).pdf

  - id: taylor-modern-physics
    title: Modern Physics for Scientists and Engineers
    authors: [John R. Taylor, Chris D. Zafiratos, Michael A. Dubson]
    edition: 2nd
    publisher: University Science Books
    year: 2003
    clusters: [quantum, physics]
    annotation: Textbook for PHY 294 Part 1. Accessible introduction to special relativity, quantum mechanics, and atomic/nuclear physics. Good bridge from classical to quantum.

  - id: schroeder-thermal
    title: An Introduction to Thermal Physics
    authors: [Daniel V. Schroeder]
    publisher: Addison-Wesley
    year: 2000
    clusters: [physics]
    annotation: Textbook for PHY 294 Part 2 (thermal physics). Intuitive coverage of thermodynamics, statistical mechanics, and entropy. Unusually clear for a physics textbook.

  # ── Neuroscience ──────────────────────────────────────────────────────────

  - id: kandel-neuroscience
    title: Principles of Neural Science
    authors: [Eric R. Kandel, John D. Koester, Sarah H. Mack, Steven A. Siegelbaum]
    edition: 6th
    publisher: McGraw-Hill
    year: 2021
    clusters: [neuroscience, bioelectricity]
    annotation: The authoritative neuroscience reference. Comprehensive coverage from ion channels and synaptic transmission to motor systems, cognition, and neurological disorders.
    source: SchoolStuff:Textbooks/neuroscience/Kandel et al - Principles of Neural Science (6th ed, 2021).pdf

  - id: bear-neuroscience
    title: "Neuroscience: Exploring the Brain"
    authors: [Mark F. Bear, Barry W. Connors, Michael A. Paradiso]
    edition: 4th
    publisher: Wolters Kluwer
    year: 2015
    clusters: [neuroscience]
    annotation: Accessible undergraduate neuroscience text. Strong on cellular and systems-level neuroscience without requiring a graduate background.
    source: SchoolStuff:Textbooks/neuroscience/Bear, Connors & Paradiso - Neuroscience Exploring the Brain (4th ed, 2015).pdf

  - id: buzsaki-rhythms
    title: Rhythms of the Brain
    authors: [Gyorgy Buzsaki]
    publisher: Oxford University Press
    year: 2006
    clusters: [neuroscience]
    annotation: Explores neural oscillations and brain rhythms — theta, gamma, sharp-wave ripples. Essential background for anyone thinking about neural signals and brain dynamics.
    source: SchoolStuff:Textbooks/neuroscience/Buzsaki - Rhythms of the Brain (2006).pdf

  # ── Neural Engineering / Bioelectricity ───────────────────────────────────

  - id: he-neural-engineering
    title: Neural Engineering
    authors: [Bin He]
    edition: 3rd
    publisher: Springer
    year: 2020
    clusters: [bioelectricity]
    annotation: Primary textbook for ECE 441. Covers neural recording, stimulation, signal processing, brain-computer interfaces, EEG/fMRI, and neuromodulation applications.
    source: SchoolStuff:Textbooks/bioelectricity/Neural Engineering.pdf

  # ── Reinforcement Learning ────────────────────────────────────────────────

  - id: sutton-barto
    title: "Reinforcement Learning: An Introduction"
    authors: [Richard S. Sutton, Andrew G. Barto]
    edition: 2nd
    publisher: MIT Press
    year: 2018
    clusters: [rl]
    annotation: The foundational RL textbook. Covers MDPs, dynamic programming, Monte Carlo methods, TD-learning, Q-learning, policy gradient methods, and deep RL connections.
    source: SchoolStuff:Textbooks/rl/Sutton & Barto - Reinforcement Learning An Introduction (2nd ed, 2018).pdf

  # ── Mathematics ───────────────────────────────────────────────────────────

  - id: strogatz-nonlinear
    title: Nonlinear Dynamics and Chaos
    authors: [Steven H. Strogatz]
    edition: 2nd
    publisher: Westview Press
    year: 2015
    clusters: [mathematics, physics]
    annotation: Exceptionally readable introduction to nonlinear dynamics — bifurcations, phase portraits, limit cycles, and chaos. Builds intuition through physical examples before formalism.
    source: SchoolStuff:Textbooks/mathematics/Strogatz - Nonlinear Dynamics and Chaos (2nd ed, 2015).pdf

  # ── Food Science ──────────────────────────────────────────────────────────

  - id: mcgee-food
    title: "On Food and Cooking: The Science and Lore of the Kitchen"
    authors: [Harold McGee]
    edition: Revised
    publisher: Scribner
    year: 2004
    clusters: [food-science, chemistry, biochemistry]
    annotation: The foundational reference for applied food science. Covers the chemistry of cooking — Maillard reactions, protein denaturation, emulsification, fermentation, and why techniques work.
    source: GoodNotes:Reading List/Cooking/ON_FOOD_AND_COOKING_The_Science_and_Lore.pdf

  # ── Adaptive & Robust Control ─────────────────────────────────────────────

  - id: ioannou-sun-adaptive
    title: Robust Adaptive Control
    authors: [Petros A. Ioannou, Jing Sun]
    publisher: Prentice-Hall
    year: 1996
    clusters: [adaptive-control]
    annotation: A rigorous treatment of model reference adaptive control, self-tuning regulators, and Lyapunov-based stability analysis for adaptive systems.

  - id: sastry-bodson-adaptive
    title: Adaptive Control — Stability, Convergence, and Robustness
    authors: [Shankar Sastry, Marc Bodson]
    publisher: Prentice-Hall
    year: 1989
    clusters: [adaptive-control]
    annotation: Foundational graduate text on adaptive control. Covers MRAC, parameter convergence, and robust modifications. A standard reference alongside Ioannou & Sun.

  # ── Nonlinear Control ─────────────────────────────────────────────────────

  - id: khalil-nonlinear
    title: Nonlinear Systems
    authors: [Hassan K. Khalil]
    edition: 3rd
    publisher: Prentice-Hall
    year: 2002
    clusters: [nonlinear-control]
    annotation: The standard graduate reference for nonlinear systems analysis — Lyapunov stability, input-output stability, feedback linearization, and sliding mode control.

  - id: slotine-li-nonlinear
    title: Applied Nonlinear Control
    authors: [Jean-Jacques E. Slotine, Weiping Li]
    publisher: Prentice-Hall
    year: 1991
    clusters: [nonlinear-control]
    annotation: More applied and accessible than Khalil. Covers sliding mode control, adaptive control, and feedback linearization with strong physical intuition.

  # ── Game Theory ───────────────────────────────────────────────────────────

  - id: osborne-rubinstein-gametheory
    title: A Course in Game Theory
    authors: [Martin J. Osborne, Ariel Rubinstein]
    publisher: MIT Press
    year: 1994
    clusters: [game-theory]
    annotation: Classic graduate text covering Nash equilibria, extensive-form games, repeated games, and bargaining theory. Freely available online from the authors.
    url: https://arielrubinstein.tau.ac.il/books/GT.pdf

  - id: shoham-leyton-brown-multiagent
    title: Multiagent Systems — Algorithmic, Game-Theoretic, and Logical Foundations
    authors: [Yoav Shoham, Kevin Leyton-Brown]
    publisher: Cambridge University Press
    year: 2009
    clusters: [game-theory]
    annotation: Covers mechanism design, auctions, social choice, and computational aspects of game theory. Bridges AI/CS and economics perspectives. Freely available online.
    url: https://www.masfoundations.org/

  # ── Machine Learning & Deep Learning ─────────────────────────────────────

  - id: goodfellow-dl
    title: Deep Learning
    authors: [Ian Goodfellow, Yoshua Bengio, Aaron Courville]
    publisher: MIT Press
    year: 2016
    clusters: [supervised-learning, deep-learning, optimization]
    annotation: The standard reference for deep learning theory and practice. Part I covers mathematical foundations and supervised learning; Parts II–III cover deep architectures, optimization, regularization, CNNs, RNNs, and autoencoders.
    url: https://www.deeplearningbook.org
    source: SchoolStuff:Textbooks/ml/Goodfellow, Bengio & Courville - Deep Learning (2016).pdf

  - id: bishop-bishop-dl
    title: "Deep Learning: Foundations and Concepts"
    authors: [Christopher M. Bishop, Hugh Bishop]
    publisher: Springer
    year: 2024
    clusters: [supervised-learning, deep-learning]
    annotation: Modern treatment from first principles, covering feedforward networks, CNNs, RNNs, attention, Transformers, diffusion models, and the probabilistic perspective. The best current single-volume reference for both foundations and modern architectures.
    source: SchoolStuff:Textbooks/ml/Bishop & Bishop - Deep Learning Foundations and Concepts (2024).pdf
