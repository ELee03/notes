<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #f5f5f2; font-family: sans-serif; padding: 24px; }
  h2 { color: #1a2840; margin-top: 40px; font-size: 14px; letter-spacing: .05em; text-transform: uppercase; }
  .row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; margin-top: 12px; }
  .col { }
  .lbl { font-size: 11px; color: #888; margin-bottom: 6px; }
  img, svg { display: block; border: 1px solid #d0d8e0; border-radius: 4px; }
</style>
</head>
<body>

<h2>Mixed-Signal Partition</h2>
<div class="row">
  <div class="col"><div class="lbl">matplotlib (current)</div><img src="_mixed_signal_partition.svg" style="max-width:680px;"></div>
  <div class="col"><div class="lbl">hand-coded SVG (iterating)</div>

<!-- ═══════════════════════════════════════════════════════ MIXED SIGNAL SVG -->
<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="width:680px;">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#c8a020"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#7a8a9a"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#c05050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="360" fill="#f7f7f4" rx="6"/>

  <!-- Board outline -->
  <rect x="12" y="12" width="656" height="320" rx="8" fill="white" stroke="#c0ccd8" stroke-width="1.5"/>

  <!-- Analog zone  x=24..310  (286 wide) -->
  <rect x="24" y="24" width="286" height="296" rx="6" fill="#fffcf0"
        stroke="#c8a020" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="167" y="48" text-anchor="middle" font-family="sans-serif" font-size="15"
        font-weight="700" fill="#7a5010">Analog Zone</text>

  <!-- Digital zone  x=370..656  (286 wide) -->
  <rect x="370" y="24" width="286" height="296" rx="6" fill="#f0f4f8"
        stroke="#3a6a8a" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="513" y="48" text-anchor="middle" font-family="sans-serif" font-size="15"
        font-weight="700" fill="#1a3860">Digital Zone</text>

  <!-- Partition boundary  x=340 (centre of 310→370 gap) -->
  <line x1="340" y1="20" x2="340" y2="322" stroke="#9aabb8" stroke-width="1"
        stroke-dasharray="4,6"/>
  <text x="340" y="344" text-anchor="middle" font-family="sans-serif" font-size="9"
        fill="#9aabb8" font-style="italic">partition boundary</text>

  <!-- ── Analog components ────────────────────────────────────────── -->
  <!-- Sensor  x=44..180  y=68..130 -->
  <rect x="44" y="68" width="136" height="62" rx="5" fill="white"
        stroke="#c8a020" stroke-width="1.3"/>
  <text x="112" y="96" text-anchor="middle" font-family="sans-serif" font-size="13"
        font-weight="700" fill="#1a2840">Sensor</text>
  <text x="112" y="114" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a8a9a">electrodes</text>

  <!-- InAmp  x=190..286  y=68..130 -->
  <rect x="190" y="68" width="110" height="62" rx="5" fill="white"
        stroke="#c8a020" stroke-width="1.3"/>
  <text x="245" y="96" text-anchor="middle" font-family="sans-serif" font-size="13"
        font-weight="700" fill="#1a2840">InAmp</text>
  <text x="245" y="114" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a8a9a">INA128</text>

  <!-- VREF  x=44..150  y=168..230 -->
  <rect x="44" y="168" width="106" height="62" rx="5" fill="white"
        stroke="#c8a020" stroke-width="1.3"/>
  <text x="97" y="196" text-anchor="middle" font-family="sans-serif" font-size="13"
        font-weight="700" fill="#1a2840">VREF</text>
  <text x="97" y="214" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a8a9a">2.5 V</text>

  <!-- Anti-alias  x=165..295  y=168..230 -->
  <rect x="165" y="168" width="130" height="62" rx="5" fill="white"
        stroke="#c8a020" stroke-width="1.3"/>
  <text x="230" y="196" text-anchor="middle" font-family="sans-serif" font-size="13"
        font-weight="700" fill="#1a2840">Anti-alias</text>
  <text x="230" y="214" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a8a9a">RC filter</text>

  <!-- Signal arrows in analog zone -->
  <!-- Sensor → InAmp -->
  <line x1="180" y1="99" x2="188" y2="99" stroke="#c8a020" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <!-- InAmp down → Anti-alias -->
  <line x1="245" y1="130" x2="245" y2="166" stroke="#c8a020" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <!-- Anti-alias right → boundary -->
  <line x1="295" y1="199" x2="320" y2="199" stroke="#7a8a9a" stroke-width="1.5"
        stroke-dasharray="4,3"/>

  <!-- ── Filter circle in gap ─────────────────────────────────────── -->
  <circle cx="340" cy="199" r="16" fill="white" stroke="#e08030" stroke-width="2"/>
  <text x="340" y="204" text-anchor="middle" font-family="monospace" font-size="11"
        font-weight="700" fill="#c05050">F</text>

  <!-- Filter → MCU -->
  <line x1="356" y1="199" x2="370" y2="199" stroke="#7a8a9a" stroke-width="1.5"
        marker-end="url(#arr-gray)"/>

  <!-- "filter at boundary" callout -->
  <line x1="348" y1="213" x2="420" y2="248" stroke="#c05050" stroke-width="1"/>
  <polygon points="345,213 352,209 352,217" fill="#c05050"/>
  <text x="424" y="252" font-family="sans-serif" font-size="10" font-style="italic"
        fill="#c05050">filter at boundary</text>

  <!-- ── Digital components ───────────────────────────────────────── -->
  <!-- MCU  x=382..536  y=68..268 -->
  <rect x="382" y="68" width="154" height="200" rx="6" fill="white"
        stroke="#3a6a8a" stroke-width="1.5"/>
  <text x="459" y="162" text-anchor="middle" font-family="sans-serif" font-size="15"
        font-weight="700" fill="#1a2840">MCU</text>
  <text x="459" y="182" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#3a6a8a">EFR32 / ADC0</text>

  <!-- Flash  x=550..644  y=68..138 -->
  <rect x="550" y="68" width="94" height="70" rx="5" fill="white"
        stroke="#3a6a8a" stroke-width="1.3"/>
  <text x="597" y="100" text-anchor="middle" font-family="sans-serif" font-size="12"
        font-weight="700" fill="#1a2840">Flash / SRAM</text>
  <text x="597" y="118" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a8a9a">SPI / QSPI</text>

  <!-- J-Link  x=544..648  y=158..228 -->
  <rect x="544" y="158" width="106" height="62" rx="5" fill="white"
        stroke="#3a6a8a" stroke-width="1.3"/>
  <text x="597" y="194" text-anchor="middle" font-family="sans-serif" font-size="11"
        font-weight="700" fill="#1a2840">J-Link / USB</text>
</svg>
<!-- ════════════════════════════════════════════════════════════════════════ -->

  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════════ -->
<h2>Buck Converter Hot Loop</h2>
<div class="row">
  <div class="col"><div class="lbl">matplotlib (current)</div><img src="_buck_hotloop.svg" style="max-width:800px;"></div>
  <div class="col"><div class="lbl">hand-coded SVG (iterating)</div>

<!-- ═══════════════════════════════════════════════════════ BUCK SVG -->
<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" style="width:820px;">
  <defs>
    <marker id="b-arr-grn" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#40a060"/>
    </marker>
    <marker id="b-arr-amb" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#c8a020"/>
    </marker>
    <marker id="b-arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#3a6a8a"/>
    </marker>
  </defs>

  <rect width="820" height="300" fill="#f7f7f4" rx="6"/>

  <!-- Title -->
  <text x="410" y="22" text-anchor="middle" font-family="sans-serif" font-size="13"
        font-weight="700" fill="#1a2840">Buck Converter — Layout View</text>

  <!-- ── Hot loop fill ─────────────────────────────────────────────── -->
  <!-- Spans C_IN through the gap only (not into Regulator box) -->
  <rect x="34" y="80" width="172" height="112" rx="3" fill="#c05050" opacity="0.09"/>

  <!-- ── Ripple loop fill ──────────────────────────────────────────── -->
  <rect x="396" y="66" width="310" height="154" rx="3" fill="#3a6a8a" opacity="0.06"/>

  <!-- ── C_IN  x=40..120  y=60..215 ──────────────────────────────── -->
  <rect x="40" y="60" width="80" height="155" rx="6" fill="white"
        stroke="#c8a020" stroke-width="1.5"/>
  <text x="80" y="133" text-anchor="middle" font-family="sans-serif" font-size="14"
        font-weight="700" fill="#1a2840">C_IN</text>
  <text x="80" y="153" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#7a6010">10 µF</text>

  <!-- ── Regulator  x=200..430  y=42..228 ─────────────────────────── -->
  <rect x="200" y="42" width="230" height="186" rx="6" fill="white"
        stroke="#3a6a8a" stroke-width="2"/>
  <text x="315" y="132" text-anchor="middle" font-family="sans-serif" font-size="14"
        font-weight="700" fill="#1a2840">Regulator</text>
  <text x="315" y="152" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#5a7a9a">TPS62x / AP63</text>

  <!-- ── L  x=490..610  y=78..202 ──────────────────────────────────── -->
  <rect x="490" y="78" width="120" height="124" rx="6" fill="white"
        stroke="#7ab8d4" stroke-width="1.5"/>
  <text x="550" y="145" text-anchor="middle" font-family="sans-serif" font-size="15"
        font-weight="700" fill="#1a2840">L</text>

  <!-- ── C_OUT  x=650..730  y=60..215 ─────────────────────────────── -->
  <rect x="650" y="60" width="80" height="155" rx="6" fill="white"
        stroke="#7ab8d4" stroke-width="1.5"/>
  <text x="690" y="133" text-anchor="middle" font-family="sans-serif" font-size="14"
        font-weight="700" fill="#1a2840">C_OUT</text>
  <text x="690" y="153" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#5a7a9a">22 µF</text>

  <!-- ── Hot traces (VIN top, GND bottom) ─────────────────────────── -->
  <!-- VIN_Y = 90,  GND_Y = 185 -->
  <line x1="120" y1="90" x2="200" y2="90" stroke="#c05050" stroke-width="3.5"/>
  <line x1="120" y1="185" x2="200" y2="185" stroke="#c05050" stroke-width="3.5"/>

  <!-- Pin labels — clearly above/below their traces -->
  <text x="196" y="76" text-anchor="end" font-family="monospace" font-size="9"
        fill="#5a7a9a">VIN</text>
  <text x="196" y="203" text-anchor="end" font-family="monospace" font-size="9"
        fill="#5a7a9a">GND</text>

  <!-- SW trace -->
  <!-- SW_Y = 137 (midpoint of regulator) -->
  <line x1="430" y1="137" x2="490" y2="137" stroke="#3a6a8a" stroke-width="2"
        marker-end="url(#b-arr-blue)"/>
  <text x="432" y="129" font-family="monospace" font-size="9" fill="#5a7a9a">SW</text>

  <!-- Inductor → C_OUT -->
  <line x1="610" y1="137" x2="650" y2="137" stroke="#3a6a8a" stroke-width="2"/>

  <!-- C_OUT → VOUT -->
  <line x1="730" y1="137" x2="780" y2="137" stroke="#40a060" stroke-width="2"
        marker-end="url(#b-arr-grn)"/>
  <text x="784" y="141" font-family="monospace" font-size="10" fill="#1a4020">VOUT</text>

  <!-- ── GND plane ─────────────────────────────────────────────────── -->
  <rect x="30" y="238" width="750" height="12" rx="2" fill="#40a060" opacity="0.3"/>
  <line x1="30" y1="238" x2="780" y2="238" stroke="#40a060" stroke-width="1.5"/>
  <!-- GND drops -->
  <line x1="80"  y1="215" x2="80"  y2="238" stroke="#40a060" stroke-width="1.5"/>
  <line x1="315" y1="228" x2="315" y2="238" stroke="#40a060" stroke-width="1.5"/>
  <line x1="690" y1="215" x2="690" y2="238" stroke="#40a060" stroke-width="1.5"/>
  <text x="410" y="252" text-anchor="middle" font-family="monospace" font-size="9"
        fill="#1a4020">GND plane</text>

  <!-- ── HOT LOOP annotation ────────────────────────────────────────── -->
  <!-- Gap centre x=(120+200)/2=160,  trace centre y=(90+185)/2=137 -->
  <rect x="119" y="121" width="82" height="32" rx="4"
        fill="#ffe8e8" stroke="#c05050" stroke-width="1" opacity="0.95"/>
  <text x="160" y="133" text-anchor="middle" font-family="sans-serif" font-size="11"
        font-weight="700" fill="#c05050">HOT LOOP</text>
  <text x="160" y="147" text-anchor="middle" font-family="sans-serif" font-size="8.5"
        font-style="italic" fill="#c05050">keep area small!</text>

  <!-- ── Ripple loop label ──────────────────────────────────────────── -->
  <text x="550" y="230" text-anchor="middle" font-family="sans-serif" font-size="9"
        font-style="italic" fill="#3a6a8a">ripple loop (larger OK)</text>

  <!-- ── Feedback trace — stays above GND plane (y<238) ───────────── -->
  <path d="M 690 215 C 715 228 500 234 360 228 C 310 225 290 228 280 228"
        fill="none" stroke="#c8a020" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#b-arr-amb)"/>
  <text x="490" y="260" text-anchor="middle" font-family="sans-serif" font-size="8.5"
        font-style="italic" fill="#7a6010">FB trace (away from L)</text>
</svg>
<!-- ════════════════════════════════════════════════════════════════════════ -->

  </div>
</div>

</body>
</html>
